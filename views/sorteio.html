<section id="view-sorteio" class="hidden-view animate-in fade-in duration-500">
            <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-6 sm:mb-8 gap-4 mt-4 bg-slate-800 p-4 sm:p-6 rounded-2xl shadow-xl border border-slate-700">
                <h2 class="text-xl sm:text-2xl font-bold flex items-center gap-2 text-white"><i data-lucide="dices" class="w-5 h-5 sm:w-6 sm:h-6 text-green-500"></i> Área de Sorteio</h2>
                
                <div class="flex flex-col sm:flex-row flex-wrap gap-2 w-full lg:w-auto items-stretch sm:items-center">
                    <select id="draftMode" class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-xs sm:text-sm text-slate-300 outline-none font-bold w-full sm:w-auto" onchange="window.toggleDraftMode && window.toggleDraftMode(); window.syncDraftSettings && window.syncDraftSettings()">
                        <option value="balanceado" selected>Sorteio Balanceado por Nível</option>
                        <option value="balanceado_elo">Sorteio Balanceado por Elo</option>
                        <option value="aleatorio">Sorteio Aleatório</option>
                        <option value="manual">Escolha Manual</option>
                    </select>

                    <select id="draftStrategy" class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-xs sm:text-sm text-slate-300 outline-none font-bold w-full sm:w-auto" onchange="window.syncDraftSettings && window.syncDraftSettings()">
                        <option value="FORA" selected>Estratégia: Fora Forte</option>
                        <option value="DENTRO">Estratégia: Dentro Forte</option>
                    </select>
                    
                    <div class="flex flex-col sm:flex-row gap-2 w-full sm:w-auto items-stretch sm:items-center">
                        <div id="teamSizeContainer" class="flex items-center bg-slate-900 border border-slate-700 rounded-lg overflow-hidden flex-1 sm:flex-none justify-center">
                            <span class="pl-3 pr-1 py-2 text-xs sm:text-sm font-bold text-slate-400 whitespace-nowrap">Time de:</span>
                            <button type="button" onclick="const t = document.getElementById('teamSize'); t.value = Math.max(2, parseInt(t.value) - 1); window.syncDraftSettings && window.syncDraftSettings();" class="px-2 sm:px-3 py-2 text-slate-400 hover:text-white hover:bg-slate-800 transition-colors font-bold text-base">-</button>
                            <input type="number" id="teamSize" value="4" min="2" max="10" class="w-6 sm:w-8 bg-transparent py-2 px-0 text-sm sm:text-base font-bold text-white text-center outline-none appearance-none m-0 pointer-events-none" onchange="window.syncDraftSettings && window.syncDraftSettings()">
                            <button type="button" onclick="const t = document.getElementById('teamSize'); t.value = Math.min(10, parseInt(t.value) + 1); window.syncDraftSettings && window.syncDraftSettings();" class="px-2 sm:px-3 py-2 text-slate-400 hover:text-white hover:bg-slate-800 transition-colors font-bold text-base">+</button>
                        </div>
                        <button id="btnDrawTeams" onclick="drawTeams()" class="flex-[2] sm:flex-none bg-green-500 hover:bg-green-600 text-slate-900 px-3 sm:px-4 py-2 rounded-lg text-xs sm:text-sm font-black flex items-center justify-center gap-2 transition-colors h-full"><i data-lucide="shuffle" class="w-4 h-4"></i> SORTEAR TIMES</button>
                    </div>
                </div>
            </div>

            <div class="bg-slate-800 rounded-2xl shadow-xl border border-slate-700 overflow-hidden w-full mb-8">
                <div class="p-4 sm:p-6 border-b border-slate-700 flex flex-col sm:flex-row justify-between items-start sm:items-center bg-slate-900/30 gap-3">
                    <h2 class="text-lg sm:text-xl font-bold">Quem vai jogar hoje?</h2>
                    <div class="flex items-center justify-between sm:justify-end gap-2 w-full sm:w-auto flex-wrap">
                        <input type="text" id="searchSorteio" placeholder="Buscar atleta..." class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-1.5 text-xs sm:text-sm text-slate-300 outline-none w-full sm:w-32 focus:border-green-500" onkeyup="window.renderSorteioTable()">
                        <select id="sortSorteio" class="bg-slate-900 border border-slate-700 rounded-lg px-2 py-1.5 text-xs sm:text-sm text-slate-300 outline-none w-full sm:w-28 focus:border-green-500" onchange="window.renderSorteioTable()">
                            <option value="default">Por Nível</option>
                            <option value="alpha">A-Z</option>
                        </select>
                        <button onclick="selectOnlyPlayersInTeams()" class="text-[10px] sm:text-xs bg-blue-500/20 hover:bg-blue-500/40 text-blue-400 px-3 py-1.5 rounded-lg border border-blue-500/30 transition-colors flex items-center gap-1 font-bold"><i data-lucide="check-square" class="w-3 h-3"></i> Em Times</button>
                        <span id="playerCountSorteio" class="text-xs sm:text-sm text-slate-400 bg-slate-900 px-2 sm:px-3 py-1.5 rounded-full border border-slate-700 whitespace-nowrap">0 / 0 Selecionados</span>
                    </div>
                </div>
                <div class="w-full max-h-[400px] overflow-y-auto overflow-x-hidden">
                    <table class="w-full text-left relative">
                        <thead class="bg-slate-900/90 text-slate-400 text-[10px] sm:text-sm sticky top-0 z-10 backdrop-blur-md">
                            <tr>
                                <th class="px-1 sm:px-4 py-3 sm:py-4 w-6 sm:w-10 text-center"><input type="checkbox" id="selectAll" onclick="toggleAllPlayers(this.checked)" class="w-3 h-3 sm:w-4 sm:h-4 accent-green-500 cursor-pointer"></th>
                                <th class="px-1 sm:px-6 py-3 sm:py-4 whitespace-nowrap">Jogador</th>
                                <th class="px-1 sm:px-6 py-3 sm:py-4 text-center">Nível</th>
                                <th class="px-1 sm:px-6 py-3 sm:py-4 text-center whitespace-nowrap">Elo (Pontos)</th>
                            </tr>
                        </thead>
                        <tbody id="sorteioTableBody" class="divide-y divide-slate-700 text-[10px] sm:text-sm"></tbody>
                    </table>
                </div>
            </div>

            <div id="adminTeamsSection" class="hidden animate-in fade-in">
                 <div class="bg-slate-800 rounded-2xl shadow-xl border border-slate-700 overflow-hidden">
                    <div class="p-4 sm:p-6 border-b border-slate-700 bg-slate-900/50 flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4">
                        <h2 class="text-lg sm:text-xl font-bold text-green-400 flex items-center gap-2"><i data-lucide="users" class="w-5 h-5"></i> Equipes Atuais</h2>
                        <div class="flex flex-wrap items-center gap-2 w-full lg:w-auto">
                            <select id="waitlistStrategy" onchange="const wsp = document.getElementById('waitlistStrategyPlacar'); if(wsp) wsp.value = this.value; window.syncDraftSettings && window.syncDraftSettings();" class="flex-1 sm:flex-none bg-slate-900 border border-slate-700 rounded-lg px-2 py-2 text-[10px] sm:text-xs text-slate-300 outline-none font-bold">
                                <option value="BALANCEADO" selected>Equilibrar</option>
                                <option value="FORCAR">Time Fora Sempre Entra</option>
                                <option value="MANTER_FORTE">Manter Jogador Forte</option>
                                <option value="ALEATORIO">Aleatório</option>
                            </select>
                            <button onclick="createWaitlist()" class="flex-1 sm:flex-none bg-blue-500/20 hover:bg-blue-500/40 text-blue-400 px-3 py-2 rounded-lg text-xs sm:text-sm font-bold border border-blue-500/30 flex items-center justify-center gap-2 transition-colors"><i data-lucide="clock" class="w-3 h-3 sm:w-4 sm:h-4"></i> ATUALIZAR TIME FORA</button>
                            <button onclick="clearTeams()" class="flex-1 sm:flex-none bg-red-500/20 hover:bg-red-500/40 text-red-400 px-3 py-2 rounded-lg text-xs sm:text-sm font-bold border border-red-500/30 flex items-center justify-center gap-2 transition-colors"><i data-lucide="trash-2" class="w-3 h-3 sm:w-4 sm:h-4"></i> LIMPAR TODAS</button>
                        </div>
                    </div>
                    <div id="adminTeamsGrid" class="p-4 sm:p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
                 </div>
            </div>
        </section>
