<section id="view-admin" class="hidden-view animate-in slide-in-from-bottom-4">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 sm:mb-8 gap-4 mt-4 bg-slate-800 p-4 sm:p-6 rounded-2xl shadow-xl border border-slate-700">
                 <div>
                    <h2 class="text-xl sm:text-2xl font-bold flex items-center gap-2"><i data-lucide="settings" class="w-5 h-5 sm:w-6 sm:h-6 text-green-500"></i> Configurações & Atletas</h2>
                    <p class="text-xs text-slate-400 mt-1">Gerencie a base de jogadores e configurações do grupo.</p>
                 </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 sm:gap-8">
                <!-- FORMULÁRIO -->
                <div class="lg:col-span-1">
                    <div class="bg-slate-800 p-4 sm:p-6 rounded-2xl shadow-xl border border-slate-700 lg:sticky top-24">
                        <div class="flex justify-between items-center cursor-pointer select-none p-2 sm:p-3 -mx-2 sm:-mx-3 -mt-2 rounded-xl hover:bg-slate-900/50 transition-colors group" onclick="document.getElementById('formContent').classList.toggle('hidden'); document.getElementById('formToggleIcon').classList.toggle('rotate-180');">
                            <h2 id="formTitle" class="text-lg sm:text-xl font-bold flex items-center gap-2 text-green-400"><i data-lucide="user-plus" class="w-5 h-5"></i> Novo Atleta</h2>
                            <div class="flex items-center gap-2"><span class="text-[10px] sm:text-xs text-slate-400 font-bold bg-slate-900 px-2 py-1 rounded-md border border-slate-700">Expandir</span><div class="bg-slate-900 p-1.5 rounded-full border border-slate-700"><i data-lucide="chevron-down" id="formToggleIcon" class="w-5 h-5 text-slate-400 transition-transform"></i></div></div>
                        </div>
                        
                        <div id="formContent" class="space-y-4 mt-4 sm:mt-6 transition-all hidden border-t border-slate-700 pt-4">
                            <input type="hidden" id="editId" value="">
                            
                            <div class="flex gap-2 bg-slate-900 p-1 rounded-lg border border-slate-700 mb-4">
                                <button type="button" id="btnModeManual" onclick="setFormMode('manual')" class="flex-1 py-2 text-xs font-bold rounded-md bg-slate-800 text-white transition-all shadow">
                                    Cadastro Manual
                                </button>
                                <button type="button" id="btnModeEmail" onclick="setFormMode('email')" class="flex-1 py-2 text-xs font-bold rounded-md text-slate-400 hover:text-white hover:bg-slate-800/50 transition-all">
                                    Vincular E-mail
                                </button>
                            </div>
                            <input type="hidden" id="formMode" value="manual">

                            <div id="emailFields" class="hidden mt-2 relative">
                                <i data-lucide="mail" class="absolute left-3 top-3.5 w-4 h-4 text-blue-500"></i>
                                <input type="email" id="playerEmail" placeholder="E-mail da conta do jogador" class="w-full bg-slate-900 border border-slate-700 rounded-lg py-3 pl-10 pr-3 text-sm text-white outline-none focus:ring-2 focus:ring-blue-500">
                                <p class="text-[9px] text-slate-400 mt-2 ml-1">
                                    <span class="font-bold text-blue-400">Nota:</span> O nome e a foto serão importados automaticamente do perfil do usuário associado a este e-mail.
                                </p>
                            </div>

                            <div id="manualFields" class="space-y-4">
                                <input type="text" id="playerName" placeholder="Nome Completo" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-sm text-white outline-none focus:ring-2 focus:ring-green-500">
                                <div class="mb-2 mt-4 flex flex-col items-center">
                                    <label class="relative cursor-pointer group/photo flex flex-col items-center">
                                        <div class="w-20 h-20 rounded-full bg-slate-900 border-2 border-dashed border-slate-600 flex items-center justify-center overflow-hidden group-hover/photo:border-green-500 transition-colors">
                                            <div id="photoPlaceholder" class="text-slate-500 flex flex-col items-center"><i data-lucide="camera" class="w-6 h-6 mb-1"></i><span class="text-[9px] font-bold uppercase">Foto</span></div>
                                            <img id="photoPreview" class="w-full h-full object-cover hidden" src="" alt="Preview">
                                        </div>
                                        <input type="file" id="playerPhoto" accept="image/*" class="hidden" onchange="handleImageUpload(event)">
                                        <input type="hidden" id="photoData" value="">
                                    </label>
                                    <button type="button" id="btnRemovePhoto" onclick="removePhoto()" class="mt-2 text-xs text-red-400 hidden flex items-center gap-1"><i data-lucide="trash-2" class="w-3 h-3"></i> Remover Foto</button>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="text-[10px] text-slate-400 font-bold uppercase mb-1 block">Categoria Base</label>
                                <select id="statCategoria" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm text-slate-200 outline-none">
                                    <option value="5">5 Estrelas</option>
                                    <option value="4">4 Estrelas</option>
                                    <option value="3">3 Estrelas</option>
                                    <option value="2">2 Estrelas</option>
                                    <option value="1">1 Estrela</option>
                                </select>
                            </div>
                            
                            <div class="grid grid-cols-3 gap-2">
                                <div><label class="text-[9px] text-blue-400 font-bold uppercase">Partidas</label><input type="number" id="statJogos" value="0" min="0" class="w-full bg-slate-900 border border-blue-500/30 rounded-lg p-2 text-sm font-bold text-blue-400 text-center"></div>
                                <div><label class="text-[9px] text-yellow-500 font-bold uppercase">Vitórias</label><input type="number" id="statVit" value="0" min="0" class="w-full bg-slate-900 border border-yellow-500/30 rounded-lg p-2 text-sm font-bold text-yellow-500 text-center"></div>
                                <div><label class="text-[9px] text-fuchsia-400 font-bold uppercase">Elo Atual</label><div class="flex items-center bg-slate-900 border border-fuchsia-500/30 rounded-lg"><button type="button" onclick="adjustBonus(-5)" class="px-2 py-2 text-fuchsia-400 font-black">-</button><input type="number" id="statBonus" value="0" class="w-full bg-transparent p-0 text-sm font-bold text-fuchsia-400 text-center outline-none"><button type="button" onclick="adjustBonus(5)" class="px-2 py-2 text-fuchsia-400 font-black">+</button></div></div>
                            </div>
                            
                            <div>
                                <label class="block text-[10px] font-medium text-slate-400 mb-1 mt-2">Tipo de Usuário</label>
                                <select id="playerRole" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-xs">
                                    <option value="jogador">👤 Jogador</option>
                                    <option value="moderador">🛡️ Moderador</option>
                                </select>
                            </div>

                            <div class="flex flex-col gap-2 mt-6">
                                <button onclick="savePlayer()" id="btnSave" class="w-full bg-green-500 hover:bg-green-600 text-slate-900 font-bold py-3 rounded-lg flex justify-center gap-2 text-sm"><i data-lucide="save" class="w-4 h-4"></i> SALVAR</button>
                                <button onclick="resetForm()" id="btnCancel" class="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 rounded-lg flex justify-center gap-2 text-sm transition-colors"><i data-lucide="x" class="w-4 h-4"></i> CANCELAR</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- TABELA ADMIN (SÓ COM EDITAR/EXCLUIR) -->
                <div class="lg:col-span-2">
                    <div class="bg-slate-800 rounded-2xl shadow-xl border border-slate-700 overflow-hidden w-full">
                        <div class="p-4 sm:p-6 border-b border-slate-700 flex flex-col sm:flex-row justify-between items-start sm:items-center bg-slate-900/30 gap-3">
                            <h2 class="text-lg sm:text-xl font-bold flex items-center gap-2">Base de Atletas Cadastrados <span id="adminPlayerCount" class="text-xs font-bold bg-slate-700 px-2 py-0.5 rounded-full text-slate-300">0</span></h2>
                            <div class="flex items-center gap-2 w-full sm:w-auto">
                                <input type="text" id="searchAdmin" placeholder="Buscar atleta..." class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-1.5 text-xs sm:text-sm text-slate-300 outline-none w-full sm:w-48 focus:border-green-500" oninput="clearTimeout(window.adminSearchTimeout); window.adminSearchTimeout = setTimeout(() => window.renderAdminTable(), 300)">
                                <select id="sortAdmin" class="bg-slate-900 border border-slate-700 rounded-lg px-2 py-1.5 text-xs sm:text-sm text-slate-300 outline-none focus:border-green-500" onchange="window.renderAdminTable()">
                                    <option value="alpha">A-Z</option>
                                    <option value="level">Por Nível</option>
                                </select>
                            </div>
                        </div>
                        <div class="w-full max-h-[600px] overflow-y-auto overflow-x-hidden">
                            <table class="w-full text-left">
                                <thead class="bg-slate-900/90 text-slate-400 text-[10px] sm:text-sm sticky top-0 z-10">
                                    <tr>
                                        <th class="px-1 sm:px-6 py-3 sm:py-4 whitespace-nowrap">Jogador</th>
                                        <th class="px-1 sm:px-6 py-3 sm:py-4 text-center">Vit / Jogos</th>
                                        <th class="px-1 sm:px-6 py-3 sm:py-4 text-center whitespace-nowrap">Nível (Elo)</th>
                                        <th class="px-1 sm:px-6 py-3 sm:py-4 text-right">Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="adminTableBody" class="divide-y divide-slate-700 text-[10px] sm:text-sm"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </section>
