<section id="view-auth" class="hidden-view flex justify-center py-12 sm:py-20 px-2 animate-in fade-in">
            <div class="bg-slate-800 p-6 sm:p-8 rounded-2xl shadow-2xl border border-slate-700 w-full max-w-md relative overflow-hidden">
                <div class="text-center mb-6">
                    <div class="bg-slate-900 inline-block p-3 rounded-full mb-3 border border-slate-700">
                        <i data-lucide="user-circle" class="w-10 h-10 sm:w-12 sm:h-12 text-green-500"></i>
                    </div>
                    <h2 id="authTitle" class="text-xl sm:text-2xl font-bold text-white">Bem-vindo</h2>
                    <p id="authSubtitle" class="text-sm text-slate-400 mt-1">Faça login para acessar seus grupos.</p>
                </div>

                <div class="space-y-4">
                    <div id="registerNameContainer" class="hidden">
                        <input type="text" id="authName" placeholder="Seu Nome Completo" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white outline-none focus:ring-2 focus:ring-green-500">
                    </div>
                    
                    <input type="email" id="authEmail" placeholder="Seu E-mail" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white outline-none focus:ring-2 focus:ring-green-500">
                    
                    <div id="passwordContainer">
                        <input type="password" id="authPass" placeholder="Sua Senha" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white outline-none focus:ring-2 focus:ring-green-500">
                    </div>

                    <div id="registerTermsContainer" class="hidden my-2">
                        <label class="flex items-start gap-2 text-xs text-slate-400 cursor-pointer">
                            <input type="checkbox" id="authAcceptTerms" class="w-4 h-4 rounded accent-green-500 mt-0.5 shrink-0">
                            <span class="leading-relaxed">Li e aceito os <a href="#" onclick="openTermsModal(event)" class="text-green-400 hover:underline font-semibold">Termos de Uso</a> e a <a href="#" onclick="openPrivacyModal(event)" class="text-green-400 hover:underline font-semibold">Política de Privacidade</a>.</span>
                        </label>
                    </div>

                    <button onclick="handleAuthAction()" id="btnAuthMain" class="w-full bg-green-500 hover:bg-green-600 text-slate-900 font-bold py-3 rounded-lg transition-colors flex justify-center items-center gap-2">
                        <i data-lucide="log-in" class="w-5 h-5"></i> ENTRAR
                    </button>
                </div>

                <!-- Divisor -->
                <div id="googleSignInDivider" class="relative my-5 flex items-center">
                    <div class="flex-grow border-t border-slate-700"></div>
                    <span class="mx-3 text-xs text-slate-500 font-bold uppercase tracking-wider">ou</span>
                    <div class="flex-grow border-t border-slate-700"></div>
                </div>

                <!-- Botão Google -->
                <button onclick="handleGoogleLogin()" id="btnGoogleLogin" class="w-full flex items-center justify-center gap-3 bg-white hover:bg-gray-100 text-slate-800 font-bold py-3 px-4 rounded-lg transition-all shadow-md border border-slate-200 hover:shadow-lg active:scale-95">
                    <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Continuar com Google
                </button>

                <p id="googleDisclaimer" class="text-[10px] text-slate-500 text-center mt-2 leading-relaxed">
                    Ao continuar com o Google, você concorda com os nossos <a href="#" onclick="openTermsModal(event)" class="text-slate-400 hover:underline">Termos de Uso</a> e <a href="#" onclick="openPrivacyModal(event)" class="text-slate-400 hover:underline">Política de Privacidade</a>.
                </p>

                <div class="mt-5 flex flex-col gap-3 text-center text-sm font-medium">
                    <button onclick="toggleAuthMode('register')" id="btnToggleAuth" class="text-slate-300 hover:text-green-400 transition-colors">Ainda não tem conta? <span class="font-bold underline">Cadastre-se</span></button>
                    <button onclick="handlePasswordReset()" id="btnResetPass" class="text-slate-500 hover:text-white transition-colors text-xs">Esqueci minha senha</button>
                </div>
            </div>
        </section>
